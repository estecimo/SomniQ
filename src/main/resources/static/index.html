<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Evaluación de Calidad de Sueño</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Basic styling for better presentation */
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding-top: 50px;
        background-color: #f0f2f5;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        color: #666;
        font-weight: 500;
      }
      select {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }
      button {
        margin-top: 2rem;
        width: 100%;
        padding: 0.75rem;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #0056b3;
      }
      p#resultado {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 1.2rem;
        font-weight: bold;
        min-height: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Calidad de Sueño (J48)</h2>

      <label for="percepcion">¿Cómo percibe su calidad de sueño?</label>
      <select id="percepcion">
        <option value="Buena">Buena</option>
        <option value="Mala">Mala</option>
      </select>

      <label for="duracion">Duración total de sueño</label>
      <select id="duracion">
        <option value="Normal">Normal (6-9 horas)</option>
        <option value="Corta">Corta (< 6 horas)</option>
        <option value="Larga">Larga (> 9 horas)</option>
      </select>

      <label for="latencia">Clasificación de latencia</label>
      <select id="latencia">
        <option value="Normal">Normal (5-15 minutos)</option>
        <option value="Prolongada">Prolongada (> 15 minutos)</option>
        <option value="Patologica">Patológica (< 5 minutos)</option>
      </select>

      <label for="covid">¿Tuvo COVID-19 en los últimos 6 meses?</label>
      <select id="covid">
        <option value="No">No</option>
        <option value="Si">Sí</option>
      </select>

      <button onclick="enviar()">Evaluar Calidad</button>

      <p id="resultado"></p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
